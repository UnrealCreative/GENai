            background: #000;

            border: 1px solid #444;
            padding: 10px;

            flex: 1;

            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            padding: 20px;

        }
        .msg {
            margin-bottom: 10px;
            line-height: 1.5;
            padding-left: 10px;
            border-left: 2px solid #333;
        }
        .user {
            border-left-color: var(--neon);
            color: var(--neon);
        }
        .ai {
            border-left-color: var(--accent);
            color: var(--accent);
        }
        .system {
            border-left-color: #888;
            color: #888;
            font-size: 14px;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background: var(--neon);
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        
        /* New Visualizer Style */
        #monitor {
            margin-top: 20px;
            padding: 15px;
            background: #000;
            border: 1px solid #444;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            color: #0f0;
            min-height: 100px;
        }
        .prob-bar {
            height: 10px;
            background: #0f0;
            margin-bottom: 5px;
            border-radius: 2px;
        }
        
        /* New features styling */
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
        
        .temp-value {
            color: var(--neon);
            font-weight: bold;
        }
    </style>
</head>

    <button onclick="train()" style="margin-top: 10px;">🧠 Sync Neurons</button>
    
    <div class="stats">
        <div>Words: <span id="word-count">0</span></div>
        <div>Phrases: <span id="phrase-count">0</span></div>
        <div>Temp: <span id="temp-value" class="temp-value">5</span></div>
    </div>
    
    <div id="monitor">
        <strong>LIVE BRAIN MONITOR</strong>
        <div id="neuron-display">Waiting for input...</div>
    </div>

    <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
    <label>Creativity (Temperature): </label>
    <input type="range" id="temp" min="1" max="10" value="5" style="width: 100%;" oninput="updateTempValue()">
</div>

<div id="chat">
    <div id="log">
        <div class="msg system">🧠 Brain Monitor Active. Try asking "What is artificial..."</div>
        <div class="msg system">💡 Pro Tip: Use longer training texts for better results!</div>
    </div>
    <div class="controls">
        <input type="text" id="user-in" placeholder="Type a start phrase..." onkeypress="handleKeyPress(event)">
        <button onclick="generate()">Generate</button>
    </div>
</div>

<script>
    let nGramModel = {};
    const N = 2;

    function train() {
        // We keep the raw text to learn from, but we lowercase it for the "Brain Map"
        const text = document.getElementById('data-input').value.toLowerCase();
        
        // Improved Regex: This keeps words together but removes the messy stuff
        const words = text.replace(/[^\w\s]/g, "").split(/\s+/).filter(w => w.length > 0);
        nGramModel = {};

        for (let i = 0; i <= words.length - N; i++) {
            let context = words.slice(i, i + N).join(" ");
            let nextWord = words[i + N] || null;
            if (!nGramModel[context]) nGramModel[context] = [];
            if (nextWord) nGramModel[context].push(nextWord);
        }
        
        // Visual feedback that the brain is case-insensitive now
        addLog("System", "Normalization Active. I now see 'Mr. Cade' and 'mr cade' as the same person.");
        updateStats(words.length, Object.keys(nGramModel).length);
    }

    function generate() {
        let rawInput = document.getElementById('user-in').value.trim();
        if (!rawInput) {
            addLog("System", "Please enter a starting phrase.");
            return;
        }
        
        addLog("User", rawInput);
        
        // NEW: Clean the input to match the lowercase brain
        let cleanInput = rawInput.toLowerCase().replace(/[^\w\s]/g, "");
        let result = cleanInput.split(/\s+/);
        
        let temp = document.getElementById('temp').value;

        for (let i = 0; i < 20; i++) {
            let context = result.slice(-2).join(" ");
            let possibilities = nGramModel[context] || [];

            // Fallback to 1 word if the pair isn't found
            if (possibilities.length === 0) {
                let lastWord = result[result.length - 1];
                for (let key in nGramModel) {
                    if (key.startsWith(lastWord + " ")) possibilities.push(...nGramModel[key]);
                }
            }

            if (possibilities.length === 0) break;

            // Show neuron probabilities on first iteration
            if (i === 0) showNeurons(possibilities);

            let nextWord;
            if (temp < 3) {
                nextWord = getMostFrequent(possibilities);
            } else {
                nextWord = possibilities[Math.floor(Math.random() * possibilities.length)];
            }
            result.push(nextWord);
        }

        addLog("AI", result.join(" ") + ".");
        document.getElementById('user-in').value = "";
    }

    function showNeurons(list) {
        const counts = {};
        list.forEach(w => counts[w] = (counts[w] || 0) + 1);
        let html = "Next word probabilities:<br>";
        // Sort by frequency (descending)
        const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        sorted.forEach(([word, count]) => {
            let percent = (count / list.length) * 100;
            html += `${word}: ${percent.toFixed(0)}%<br><div class="prob-bar" style="width: ${percent}%"></div>`;
        });
        document.getElementById('neuron-display').innerHTML = html;
    }

    function getMostFrequent(arr) {
        return arr.sort((a, b) => 
            arr.filter(v => v===a).length - arr.filter(v => v===b).length
        ).pop();
    }

    function addLog(sender, text) {
        const log = document.getElementById('log');
        const div = document.createElement('div');
        div.className = `msg ${sender.toLowerCase()}`;
        div.innerHTML = `<strong>${sender}: </strong> ${text}`;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }
    
    function updateStats(words, phrases) {
        document.getElementById('word-count').textContent = words;
        document.getElementById('phrase-count').textContent = phrases;
    }
    
    function updateTempValue() {
        const temp = document.getElementById('temp').value;
        document.getElementById('temp-value').textContent = temp;
    }
    
    function handleKeyPress(event) {
        if (event.key === "Enter") {
            generate();
        }
    }
    
    // Initialize on load
    window.onload = function() {
        train();
        updateTempValue();
    };
</script>
