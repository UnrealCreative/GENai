<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lil Gemini v5.2: The Knowledge Engine</title>
    <style>
        :root {
            --bg: #050505;
            --neon: #00ffcc;
            --text: #d1d1d1;
            --accent: #bb86fc;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #sidebar {
            width: 350px;
            background: #111;
            padding: 20px;
            border-right: 1px solid #333;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        #chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            background: #000;
            color: var(--neon);
            border: 1px solid #444;
            padding: 10px;
            font-family: monospace;
            border-radius: 5px;
        }
        #log {
            flex: 1;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }
        .msg {
            margin-bottom: 10px;
            line-height: 1.5;
            padding-left: 10px;
            border-left: 2px solid #333;
        }
        .user {
            border-left-color: var(--neon);
            color: var(--neon);
        }
        .ai {
            border-left-color: var(--accent);
            color: var(--accent);
        }
        .system {
            border-left-color: #888;
            color: #888;
            font-size: 14px;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background: var(--neon);
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        
        /* New Visualizer Style */
        #monitor {
            margin-top: 20px;
            padding: 15px;
            background: #000;
            border: 1px solid #444;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            color: #0f0;
            min-height: 100px;
        }
        .prob-bar {
            height: 10px;
            background: #0f0;
            margin-bottom: 5px;
            border-radius: 2px;
        }
        
        /* New features styling */
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
        
        .temp-value {
            color: var(--neon);
            font-weight: bold;
        }
        
        /* Reasoning Block Styles */
        #thought-process {
            font-size: 11px;
            color: #888;
            font-style: italic;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 5px;
            display: none;
        }
        .thinking-dot { 
            animation: pulse 1s infinite; 
        }
        @keyframes pulse { 
            0% { opacity: 1; } 
            50% { opacity: 0.3; } 
            100% { opacity: 1; } 
        }
        
        h3 {
            color: var(--neon);
            margin-top: 0;
        }
        
        /* Memory bank display */
        #memory-bank {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            font-size: 12px;
        }
        
        #memory-bank h4 {
            margin: 0 0 5px 0;
            color: var(--neon);
        }
        
        #memory-items {
            display: flex;
            gap: 5px;
        }
        
        .memory-item {
            background: rgba(187, 134, 252, 0.2);
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>🧠 Training Data</h3>
    <textarea id="data-input">
Artificial intelligence is a tool for humans.
Artificial intelligence is the future of science.
Artificial intelligence is scary but cool.
Artificial intelligence is what we make of it.
What is AI? AI is a branch of code.
What is AI? AI is basically math.
The future holds many possibilities for AI.
AI can help solve complex problems.
Machine learning is a subset of AI.
Neural networks power modern AI systems.
    </textarea>
    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button onclick="train()">🧠 Sync Knowledge</button>
        <button onclick="trainFromCloud()">☁️ Fetch from Cloud</button>
    </div>
    
    <div class="stats">
        <div>Facts: <span id="word-count">0</span></div>
        <div>Phrases: <span id="phrase-count">0</span></div>
        <div>Temp: <span id="temp-value" class="temp-value">5</span></div>
    </div>
    
    <div id="monitor">
        <strong>LIVE BRAIN MONITOR</strong>
        <div id="neuron-display">Waiting for input...</div>
    </div>
    
    <div id="memory-bank">
        <h4>🧠 MEMORY BANK</h4>
        <div id="memory-items">
            <div class="memory-item">None</div>
        </div>
    </div>

    <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
    <label>Creativity (Temperature): </label>
    <input type="range" id="temp" min="1" max="10" value="5" style="width: 100%;" oninput="updateTempValue()">
</div>

<div id="chat">
    <div id="log">
        <div class="msg system">🧠 Knowledge Engine Active. Try asking "What is AI?"</div>
        <div class="msg system">💡 Pro Tip: Use longer training texts for better results!</div>
        <div class="msg system">✨ New: Memory Bank with contextual recall!</div>
    </div>
    <div id="thought-process"></div>
    <div class="controls">
        <input type="text" id="user-in" placeholder="Ask me anything..." onkeypress="handleKeyPress(event)">
        <button onclick="generate()">Generate</button>
    </div>
</div>

<script>
    let knowledgeBase = [];
    let nGramModel = {};
    const N = 2;
    let memoryBank = []; // Stores the last 3 topics discussed

    // Change the URL to the "raw" version of your GitHub link
    const GITHUB_URL = "https://raw.githubusercontent.com/UnrealCreative/aiTrainingData/main/main.txt";

    async function trainFromCloud() {
        const thoughtBox = document.getElementById('thought-process');
        thoughtBox.style.display = "block";
        thoughtBox.innerHTML = "Connecting to GitHub Knowledge Base...";

        try {
            const response = await fetch(GITHUB_URL);
            if (!response.ok) throw new Error("Could not connect to GitHub");
            
            const rawData = await response.text();
            
            // Update the textarea so you can see what it downloaded
            document.getElementById('data-input').value = rawData;
            
            // Run the normal training logic
            train(); 
            
            addLog("System", "Cloud Sync Complete! Knowledge base updated from GitHub.");
        } catch (error) {
            addLog("System", "Error: " + error.message);
        }
        
        setTimeout(() => { thoughtBox.style.display = "none"; }, 2000);
    }

    function train() {
        const rawData = document.getElementById('data-input').value;
        
        // 1. Break data into individual "Knowledge Sentences"
        knowledgeBase = rawData.split(/[.\n]/).filter(s => s.trim().length > 10);
        
        // 2. Build the word map for generation
        const words = rawData.toLowerCase().replace(/([.?!])/g, " $1 ").split(/\s+/).filter(w => w.length > 0);
        nGramModel = {};
        for (let i = 0; i <= words.length - (N + 1); i++) {
            let context = words.slice(i, i + N).join(" ");
            let nextWord = words[i + N];
            if (!nGramModel[context]) nGramModel[context] = [];
            nGramModel[context].push(nextWord);
        }
        
        addLog("System", "RAG Engine Active. I will now search for answers before speaking.");
        updateStats(knowledgeBase.length, Object.keys(nGramModel).length);
    }

    async function generate() {
        let rawInput = document.getElementById('user-in').value.trim();
        if (!rawInput) return;
        
        addLog("User", rawInput);
        document.getElementById('user-in').value = "";

        const thoughtBox = document.getElementById('thought-process');
        thoughtBox.style.display = "block";
        thoughtBox.innerHTML = "Synthesizing dialogue path...";

        let lowInput = rawInput.toLowerCase().replace(/[^\w\s]/g, "");
        
        // 1. ADVANCED INTENT DETECTION
        const socialMaps = {
            greeting: ["hi", "hello", "hey", "yo", "sup"], 
            identity: ["who are you", "what are you", "your name"], 
            meta: ["how do you work", "how are you smart", "what is your brain"]
        };

        if (socialMaps.greeting.some(s => lowInput.includes(s))) {
            const hi = ["Hey there! Ready to dive into some data?", "Hello! King's assistant at your service.", "Yo! What are we building today?"];
            addLog("AI", hi[Math.floor(Math.random() * hi.length)]);
            setTimeout(() => { thoughtBox.style.display = "none"; }, 1500);
            return;
        }

        // 2. THE SEARCH (RAG)
        const stopWords = ["what", "is", "the", "a", "does", "mean", "can", "you", "tell"];
        let queryWords = lowInput.split(/\s+/).filter(w => !stopWords.includes(w) && w.length > 2);
        
        let bestSentence = "";
        let highestScore = 0;

        knowledgeBase.forEach(sentence => {
            let score = 0;
            queryWords.forEach(word => {
                if (sentence.toLowerCase().includes(word)) score += 10;
            });
            if (score > highestScore) { highestScore = score; bestSentence = sentence.trim(); }
        });

        // 3. THE "TALKING" ENGINE (Synthesis)
        if (highestScore > 5) {
            // Conversation Wrappers
            const wrappers = [
                `I've learned that ${bestSentence.charAt(0).toLowerCase() + bestSentence.slice(1)}`, 
                `If you're asking about that, remember: ${bestSentence}`, 
                `In my database, it says ${bestSentence.charAt(0).toLowerCase() + bestSentence.slice(1)}`, 
                `King programmed me to know that ${bestSentence.charAt(0).toLowerCase() + bestSentence.slice(1)}`
            ];
            
            let finalResponse = wrappers[Math.floor(Math.random() * wrappers.length)];
            
            // Remove the period at the end if it's in the middle of our wrapper
            finalResponse = finalResponse.replace(/\.\./g, "."); 
            
            addLog("AI", finalResponse);
            if (queryWords.length > 0) {
                memoryBank.unshift(queryWords[0]);
                if (memoryBank.length > 3) memoryBank.pop();
                updateMemoryDisplay();
            }
        } else {
            addLog("AI", "I don't have a specific fact for that yet, but I'm learning more every day. Ask me about Python, Axioms, or King!");
        }

        setTimeout(() => { thoughtBox.style.display = "none"; }, 1500);
    }

    function getMostFrequent(arr) {
        let counts = arr.reduce((acc, v) => { acc[v] = (acc[v] || 0) + 1; return acc; }, {});
        return Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
    }

    function addLog(sender, text) {
        const log = document.getElementById('log');
        const div = document.createElement('div');
        div.className = `msg ${sender.toLowerCase()}`;
        div.innerHTML = `<strong>${sender}: </strong> ${text}`;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }
    
    function updateStats(facts, phrases) {
        document.getElementById('word-count').textContent = facts;
        document.getElementById('phrase-count').textContent = phrases;
    }
    
    function updateTempValue() {
        const temp = document.getElementById('temp').value;
        document.getElementById('temp-value').textContent = temp;
    }
    
    function handleKeyPress(event) {
        if (event.key === "Enter") {
            generate();
        }
    }
    
    function updateMemoryDisplay() {
        const memoryItems = document.getElementById('memory-items');
        memoryItems.innerHTML = '';
        
        if (memoryBank.length === 0) {
            memoryItems.innerHTML = '<div class="memory-item">None</div>';
            return;
        }
        
        memoryBank.forEach(item => {
            const div = document.createElement('div');
            div.className = 'memory-item';
            div.textContent = item;
            memoryItems.appendChild(div);
        });
    }
    
    window.onload = function() {
        train();
        updateTempValue();
        updateMemoryDisplay();
    };
</script>
</body>
</html>
